services:
  # Copia la DB al volumen compartido y se apaga
  db-init:
    image: alpine
    volumes:
      - ./restaurant.db:/src/restaurant.db
      - shared-db:/app/data
    command: sh -c "cp -n /src/restaurant.db /app/data/restaurant.db && echo 'DB lista'"
    restart: "no"
    networks:
      - restaurant-network

  home:
    build:
      context: /home
    ports:
      - "80:5000"
    environment:
      - HISTORIAL_SERVICES=http://historial:5000
      - INVENTARIO_SERVICES=http://inventario:5000
      - COCINA_SERVICES=http://cocina:5000
    depends_on:
      - historial
      - inventario
      - cocina
    networks:
      - restaurant-network
    restart: unless-stopped

  historial:
    build:
      context: /historial
    expose:
      - "5000"
    environment:
      - DATABASE_PATH=/app/data/restaurant.db
    volumes:
      - shared-db:/app/data
    depends_on:
      - db-init
    networks:
      - restaurant-network
    restart: unless-stopped

  inventario:
    build:
      context: /inventario
    expose:
      - "5000"
    environment:
      - DATABASE_PATH=/app/data/restaurant.db
    volumes:
      - shared-db:/app/data
    depends_on:
      - db-init
    networks:
      - restaurant-network
    restart: unless-stopped

  cocina:
    build:
      context: /cocina
    expose:
      - "5000"
    environment:
      - DATABASE_PATH=/app/data/restaurant.db
    volumes:
      - shared-db:/app/data
    depends_on:
      - db-init
    networks:
      - restaurant-network
    restart: unless-stopped
volumes:
  shared-db:
    driver: local

networks:
  restaurant-network:
    driver: bridge
