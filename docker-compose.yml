services:
  home:
    build:
      context: ./home
    ports:
      - "80:5000"
    environment:
      - HISTORIAL_SERVICE = https://comias-historial.onrender.com
      - INVENTARIO_SERVICE = https://comias-inventario.onrender.com
      - COCINA_SERVICE = https://comias-cocina.onrender.com
    depends_on:
      historial:
        condition: service_healthy
      inventario:
        condition: service_healthy
      cocina:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  historial:
    build:
      context: ./historial
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - restaurant-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  inventario:
    build:
      context: ./inventario
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - restaurant-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  cocina:
    build:
      context: ./cocina
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - restaurant-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

networks:
  restaurant-network:
    driver: bridge