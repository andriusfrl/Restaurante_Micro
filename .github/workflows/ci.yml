name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run linting
        run: flake8 --max-line-length=120 --ignore=E501,W503 home/ historial/ inventario/ cocina/

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Home
        run: docker build -t comias-home ./home

      - name: Build Historial
        run: docker build -t comias-historial ./historial

      - name: Build Inventario
        run: docker build -t comias-inventario ./inventario

      - name: Build Cocina
        run: docker build -t comias-cocina ./cocina